# com.codelog.CodeLogApplication — eski/ayrı REST katmanı.
# Frontend ve JWT blog API'si com.nazli.blog.BlogBackendApplication ile 8080 portunda çalışır.
# İki uygulamayı aynı anda çalıştırırken 8080 çakışmasını önlemek için bu modül 8081 kullanır.
server.port=8081
spring.datasource.url=jdbc:h2:mem:codelogdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
